<!DOCTYPE html>
<html>
<head>
    <title>Quiz Simples</title>
</head>

<body>

<h1>Quiz de Conhecimento</h1>

<p>Qual é a capital do Brasil?</p>

<input type="radio" name="resposta" value="Rio"> Rio de Janeiro<br>
<input type="radio" name="resposta" value="Brasilia"> Brasília<br>
<input type="radio" name="resposta" value="SP"> São Paulo<br><br>

<button onclick="verificarResposta()">Responder</button>

<p id="resultado"></p>

<script>

function verificarResposta() {

    var respostas = document.getElementsByName("resposta");
    var respostaSelecionada = "";

    for (var i = 0; i < respostas.length; i++) {
        if (respostas[i].checked) {
            respostaSelecionada = respostas[i].value;
        }
    }

    if (respostaSelecionada == "Brasilia") {
        document.getElementById("resultado").innerText = "Acertou!";
    }
    else {
        document.getElementById("resultado").innerText = "Errou!";
    }

}

</script>

</body>
</html>
